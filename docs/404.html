<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Finance Tracker</title>
    <script type="text/javascript">
      // This script handles the redirect for React Router
      // It captures the requested path and redirects to index.html
      // so React Router can handle the routing client-side
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/finance-tracker/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
        (l.search ? '?' + l.search.slice(1) : '')
      );
    </script>
  </head>
  <body>
  </body>
</html>
